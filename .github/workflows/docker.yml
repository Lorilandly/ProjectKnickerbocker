name: Docker

on:
  push:
    branches: [master]

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    # Only run after CI passes
    needs: []

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/knickerbocker-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/knickerbocker-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/knickerbocker-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/knickerbocker-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
