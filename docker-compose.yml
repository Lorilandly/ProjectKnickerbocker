services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite:/app/data/score_tracker.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - SERVER_ADMIN_EMAILS=${SERVER_ADMIN_EMAILS}
      - AUTH_REDIRECT_URL=${AUTH_REDIRECT_URL}
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
